<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolta.cc | Guaranteed Auto Parts Fit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Bolta<span>.cc</span></div>
            <button class="emergency-btn">Request Sattah 🚨</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Find the Right Part, <span class="highlight">Guaranteed.</span></h1>
            <p>Direct from suppliers to your doorstep or mechanic.</p>
            
            <div class="search-container">
                <div class="search-box">
                    <h3>Search by VIN</h3>
                    <input type="text" placeholder="Enter 17-digit VIN number..." maxlength="17">
                    <button class="primary-btn">Find Parts</button>
                </div>

                <div class="divider">OR</div>

                <div class="search-box">
                    <h3>Select Your Vehicle</h3>
                    <select><option>Select Year</option></select>
                    <select><option>Select Make</option></select>
                    <select><option>Select Model</option></select>
                    <button class="secondary-btn">Browse Catalog</button>
                </div>
            </div>
        </section>

        <section class="features">
            <div class="feature">
                <h4>Verified Fit</h4>
                <p>We use VIN-matching to ensure every part fits your exact car.</p>
            </div>
            <div class="feature">
                <h4>Transparent Pricing</h4>
                <p>No more haggling. Get the best price from our supplier network.</p>
            </div>
        </section>
    </main>
</body>
</html>
